# Loads any *.json dashboard from /var/lib/grafana/dashboards on startup.
apiVersion: 1

providers:
  - name: 'micro-exchange'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
