# Logrotate config for Micro-Exchange host service logs.
#
# Install (macOS / Linux):
#   brew install logrotate                        # macOS
#   sudo apt install logrotate                    # Debian/Ubuntu
#
# Hourly rotation via cron (avoids the .logs dir growing past ~700MB total):
#   crontab -e
#   0 * * * * /usr/sbin/logrotate -s /tmp/logrotate.state /Users/admin/HieuTo/Base/micro-exchange/infra/logrotate/micro-exchange.conf
#
# `copytruncate` is used because Go services hold open file handles via the
# `>>` redirect in start-all.sh — we cannot rename then SIGHUP without losing
# in-flight writes. Truncate-in-place keeps the same inode so filebeat's
# registry stays valid and shipping resumes from byte 0 of the rotated file.

/Users/admin/HieuTo/Base/micro-exchange/.logs/*.log {
    hourly
    rotate 24
    size 100M
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d-%H%M%S
}
